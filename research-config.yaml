research:
  objective: >
    Design a full autonomous trading bot for MetaTrader 5 (MT5), optimized for
    Apple Silicon (M5 Pro, 24GB RAM), trained on domain knowledge from an Obsidian
    vault and iteratively self-improved using structured research and error-correction
    frameworks.

  topic: "MT5 Autonomous Trading Bot for Apple Silicon"

  krqs:
    - "KRQ1: What are the viable methods to connect Python on macOS to MT5 running in a Windows environment, and what are the trade-offs of each approach?"
    - "KRQ2: Which backtesting frameworks are ARM-native or perform well on Apple Silicon, and how do they compare in speed, features, and ease of use?"
    - "KRQ3: What architectures exist for self-improving trading bots that iterate on strategy parameters using mechanical metrics?"
    - "KRQ4: What risk management frameworks and production safeguards are standard for autonomous trading systems?"
    - "KRQ5: What are the memory and CPU optimization patterns for running a trading bot + backtesting loop concurrently on a 24GB unified memory system?"

  scope:
    in_scope:
      - Python MT5 integration on macOS (Wine alternatives, socket bridges, ZMQ)
      - ARM-native ML/data libraries (NumPy, Pandas, PyTorch MPS, scikit-learn)
      - Vectorised backtesting frameworks (VectorBT, Backtrader, Zipline-reloaded)
      - Self-improving trading loops (Bayesian optimisation, evolutionary algorithms)
      - Risk management frameworks (Kelly criterion, ATR sizing, drawdown controls)
      - Production safeguards (circuit breakers, order deduplication, fail-safes)
    out_of_scope:
      - Windows-only solutions without macOS bridge
      - Manual trading strategies (must be fully autonomous)
      - High-frequency trading (< 1s latency requirements)
      - Non-MT5 broker platforms
    nice_to_have:
      - RL-based strategy adaptation
      - Multi-asset correlation-aware portfolio management

  audience: "senior developer building a production trading system"

  decision_context: >
    Building a personal autonomous trading bot that runs 24/7 on a MacBook Pro M5 Pro.
    Must use MT5 broker connection. Goal is Sharpe > 1.5, max drawdown < 5%.

  claims_to_validate:
    - id: C1
      claim: "MetaTrader5 Python library only works on Windows"
      source: "MetaTrader5 documentation"
      expected_verdict: CORROBORATED
    - id: C2
      claim: "ZMQ bridges can reliably connect Python on macOS to MT5 on Windows VM"
      source: "Community forums"
      expected_verdict: CORROBORATED
    - id: C3
