bridge:
  base_url: "http://192.168.64.1:8080"   # UTM host-only network; EA connects here
  heartbeat_timeout: 10                   # seconds before connection considered lost

bot:
  mode: "paper"           # paper | live  (NEVER change to live without --confirm-live flag)
  instruments:
    - "EURUSD"
  timeframe: "M15"
  log_level: "INFO"

risk:
  min_equity: 0.0                # set to 0 for demo/test; raise to 1000 for production
  max_risk_per_trade: 0.01       # 1% of equity per trade
  kelly_fraction: 0.25           # Quarter Kelly (conservative start)
  daily_loss_limit: 0.02         # 2% daily hard stop
  trailing_dd_warn: 0.10         # 10% DD → reduce position 30%
  trailing_dd_reduce: 0.15       # 15% DD → reduce position 50%
  trailing_dd_halt: 0.20         # 20% DD → halt all trading
  alert_loss_usd: 50.0           # single-trade loss threshold for WARNING log

autoresearch:
  target_sharpe: 1.5
  max_drawdown_guard: 0.05
  min_win_rate_guard: 0.43          # fallback when strategy-specific value is absent
  min_win_rate_guard_ema: 0.30      # EMA crossover break-even at ~2.3:1 R:R (ATR 1.5× SL/TP); Sharpe is the primary gate
  min_win_rate_guard_mr: 0.50       # mean reversion on M15; raise to 0.55 on real H1 data
  iterations: 50
  metric_command: "python backtest/engine.py --metric sharpe"
  guard_command: "python backtest/engine.py --guard"
  enabled: false            # OOS window v2 opened 2026-04-29 after paper-broker resilience fix; re-enable only after DSR re-evaluation at >=200 closed paper trades
  iterations_per_run: 5      # steps per background run (full 50 spread across multiple restarts)
  cooldown_seconds: 3600     # wait this long before restarting after a run completes
  wf_train_pct: 0.8          # walk-forward hold-out fraction for guard calls (0.0 disables)
  multi_symbol_mean: true    # aggregate verify sharpe as mean across symbols
  cv_n_splits: 5             # 5 folds on M15
  cv_embargo: 96             # 1 trading day on M15 (96 bars = 4 bars/hr × 24 hrs)
  min_trades_per_fold: 5     # require at least 5 trades per fold; M15 generates enough
  verify_bars: 5000          # EURUSD M15 available bars

monitoring:
  poll_interval_s: 5            # PositionMonitor polling interval
  log_path: "logs/positions.jsonl"

pairs_trading:
  symbol1: "EURUSD"
  symbol2: "GBPUSD"
  entry_zscore: 2.0             # z-score threshold to enter a spread position
  exit_zscore: 0.5              # z-score threshold to exit (not used by backtest SL/TP exit)
  spread_window: 60             # bars for rolling z-score and half-life estimation
  hedge_window: 60              # bars for rolling OLS hedge ratio β
  atr_sl_multiplier: 1.5
  atr_period: 14
  require_cointegration: false  # set true to enforce ADF p-value gate
  coint_pvalue_threshold: 0.05
  coint_check_every: 20

filters:
  sessions:
    enabled: true
    allowed:
      - "london"       # 07:00–16:00 UTC
      - "new_york"     # 12:00–21:00 UTC
  news_blackout:
    enabled: false               # set true once calendar_path is populated
    buffer_minutes: 30
    calendar_path: "data/news_calendar.csv"
  regime:
    enabled: true
    method: "vol"      # "vol" (fast, no deps) or "hmm" (requires hmmlearn)
    window: 20         # rolling window for vol calculation
    strategy_regime_map:
      ema_crossover: [0]    # only trade in TREND regime (0)
      mean_reversion: [1]   # only trade in RANGE regime (1)
      trend_following: [0]  # FX GOAT trend follower — TREND regime only
  meta_labeller:
    enabled: false              # start disabled; enable after ~30 closed trades warm-up
    threshold: 0.55             # minimum P(profit) to pass a signal through
    min_train_trades: 20        # labelled trades needed before model activates
    retrain_every: 10           # retrain model every N new closed trades
    use_gradient_boost: false   # false = logistic regression; true = GBT (slower)
